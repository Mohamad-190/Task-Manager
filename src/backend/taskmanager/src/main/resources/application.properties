spring.application.name=taskmanager
spring.datasource.url=jdbc:h2:mem:taskmanager
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop

# Admin-Bootstrap (aus .env)
admin.bootstrap.username=${ADMIN_USERNAME}
admin.bootstrap.email=${ADMIN_EMAIL}
admin.bootstrap.password=${ADMIN_PASSWORD}
admin.bootstrap.phone=${ADMIN_PHONE:}

# JWT (aus .env)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
