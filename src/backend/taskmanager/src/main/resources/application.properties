spring.application.name=taskmanager
spring.config.import=optional:file:.env[.properties]

# PostgreSQL (Konfiguration aus .env)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# Schema bleibt zwischen Neustarts erhalten und wird bei Modelaenderungen erweitert
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Admin-Bootstrap (aus .env)
admin.bootstrap.username=${ADMIN_USERNAME}
admin.bootstrap.email=${ADMIN_EMAIL}
admin.bootstrap.password=${ADMIN_PASSWORD}
admin.bootstrap.phone=${ADMIN_PHONE:}

# JWT (aus .env)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
